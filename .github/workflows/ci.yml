name: CI

# Runs static checks only — NOT the voice/LLM pipeline itself.
# This project requires a GPU, microphone, and locally-running Ollama
# models, none of which are available on GitHub-hosted runners. This
# workflow validates code health (syntax, lint, dependency resolution)
# rather than pretending to exercise the actual runtime.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy

      - name: Validate Python syntax (all files compile)
        run: |
          python -m compileall -q core/ flash_copilot.py

      - name: Lint with ruff
        run: |
          ruff check . --output-format=github

      - name: Check code formatting with black
        run: |
          black --check .

      - name: Type check with mypy
        run: |
          mypy core/ --ignore-missing-imports

      - name: Verify requirements.txt resolves
        run: |
          pip install --dry-run -r requirements.txt

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run dependency audit (if available)
        run: |
          pip install pip-audit || echo "pip-audit not available, skipping"
          pip-audit || echo "Advisory found but continuing"
